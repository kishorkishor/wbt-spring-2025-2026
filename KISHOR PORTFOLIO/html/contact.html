<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kishor Tarafder</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css">
    <link rel="stylesheet" type="text/css" href="../css/contact.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="../index.html" class="logo">KT</a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="educations.html">Education</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Contact</h1>

        <div class="contact-form">
            <form method="post">
                <fieldset>
                    <legend>Contact Form</legend>

                    <table>
                        <tr>
                            <td><label for="fname">First Name:</label></td>
                            <td><input type="text" id="fname" placeholder="Enter your first name" name="fname" required></td>
                        </tr>

                        <tr>
                            <td><label for="lname">Last Name:</label></td>
                            <td><input type="text" id="lname" placeholder="Enter your last name" name="lname" required></td>
                        </tr>

                        <tr>
                            <td><label>Gender:</label></td>
                            <td>
                                <input type="radio" name="gender" value="male" required> Male
                                <input type="radio" name="gender" value="female"> Female
                                <input type="radio" name="gender" value="other"> Other
                            </td>
                        </tr>

                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" placeholder="kishortarafder@gmail.com" name="email" required></td>
                        </tr>

                        <tr>
                            <td><label for="company">Company:</label></td>
                            <td><input type="text" id="company" placeholder="Enter your company name" name="company"></td>
                        </tr>

                        <tr>
                            <td><label>Reason of Contact:</label></td>
                            <td>
                                <input type="checkbox" name="reason" value="projects"> Projects
                                <input type="checkbox" name="reason" value="thesis"> Thesis
                                <input type="checkbox" name="reason" value="job"> Job
                            </td>
                        </tr>

                        <tr>
                            <td><label>Topics:</label></td>
                            <td>
                                <input type="checkbox" name="topics" value="web"> Web Development
                                <input type="checkbox" name="topics" value="mobile"> Mobile Development
                                <input type="checkbox" name="topics" value="aiml"> AI/ML Development
                            </td>
                        </tr>

                        <tr>
                            <td><label for="cdate">Consultation Date:</label></td>
                            <td><input type="date" id="cdate" name="cdate" required></td>
                        </tr>

                        <tr>
                            <td></td>
                            <td>
                                <input type="submit" value="Submit">
                                <input type="reset">
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p class="footer-name">Kishor Tarafder</p>
            <p class="footer-title">Quant Engineer</p>
            <p>222/A North Shahjahanpur, Dhaka</p>
            <p><a href="mailto:kishortarafder@gmail.com">kishortarafder@gmail.com</a></p>
            <div class="social-icons">
                <a href="https://github.com" target="_blank"><img src="../images/github.png" alt="GitHub"></a>
                <a href="https://linkedin.com" target="_blank"><img src="../images/linkedin.png" alt="LinkedIn"></a>
            </div>
            <p class="footer-copy">&copy; 2026 Kishor Tarafder</p>
        </div>
    </footer>
</body>
</html>
