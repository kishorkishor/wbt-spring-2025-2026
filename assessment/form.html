<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Form</title>
    <link rel="stylesheet" type="text/css" href="../css/form.css">
</head>
<body>



    <div class="container">





    <h2>Donor Information</h2>

    <form method="post">
        <table>
            <tr>
                <td><label for="fname">First Namee<span class="required">*</span></label></td>
                <td><input type="text" id="fname" name="fname"></td>
            </tr>
            <tr>
                <td><label for="lname">Last Name<span class="required">*</span></label></td>
                <td><input type="text" id="lname" name="lname"></td>
            </tr>
            <tr>
                <td><label for="company">Company</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>
            <tr>
                <td><label for="address1">Address 1<span class="required">*</span></label></td>
                <td><input type="text" id="address1" name="address1"></td>
            </tr>
            <tr>
                <td><label for="address2">Address 2</label></td>
                <td><input type="text" id="address2" name="address2"></td>
            </tr>
            <tr>
                <td><label for="city">City<span class="required">*</span></label></td>
                <td><input type="text" id="city" name="city"></td>
            </tr>
            <tr>
                <td><label for="state">State<span class="required">*</span></label></td>
                <td>
                    <select id="state" name="state">
                        <option value="">Select a State</option>
                        <option value="AL">bd</option>

                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="zip">Zip Code<span class="required">*</span></label></td>
                <td><input type="text" id="zip" name="zip"></td>
            </tr>
            <tr>
                <td><label for="country">Country<span class="required">*</span></label></td>
                <td>
                    <select id="country" name="country">
                        <option value="">Select a Country</option>
                        <option value="US">bd</option>

                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="phone">Phone</label></td>
                <td><input type="text" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td><label for="fax">Fax</label></td>
                <td><input type="text" id="fax" name="fax"></td>
            </tr>
            <tr>
                <td><label for="email">Email<span class="required">*</span></label></td>
                <td><input type="text" id="email" name="email"></td>
            </tr>
            <tr>
                <td>
                    <label>Donation Amount<span class="required">*</span></label>
                    <br>
                    <span class="note">(Check a button or type in your<br>amount)</span>
                </td>
                <td>
                    <input type="radio" name="donation" value="none" checked> None
                    <input type="radio" name="donation" value="50"> tk50

                </td>
            </tr>
            <tr>
                <td></td>
                <td>Other Amount $ <input type="text" id="other-amount" name="other-amount" class="small-input"></td>
            </tr>
            <tr>
                <td>
                    <label>Recurring Donation</label>
                    <br>
                    <span class="note">(Check if yes)</span>
                </td>
                <td>
                    <input type="checkbox" name="recurring" value="yes"> I am interested in giving on a regular basis.
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    Monthly Credit Card $ <input type="text" name="monthly-amount" class="small-input">
                    For <input type="text" name="months-for" class="small-input">
                    Months
                </td>
            </tr>
        </table>
    </form>



    <div>

</body>
</html>
